<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>MaximisedAI Staging</title>
    <style>
      body { margin: 0; min-height: 100vh; display: grid; place-items: center; font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #111827; color: #f9fafb; }
      main { width: min(680px, calc(100% - 32px)); background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.12); border-radius: 24px; padding: 32px; box-shadow: 0 24px 80px rgba(0,0,0,.35); }
      h1 { margin: 0 0 8px; font-size: clamp(2rem, 8vw, 4rem); letter-spacing: -0.06em; }
      p { color: #cbd5e1; line-height: 1.55; }
      a { color: #93c5fd; font-weight: 700; }
      .grid { display: grid; gap: 12px; margin-top: 24px; }
      .card { padding: 16px; border-radius: 16px; background: rgba(255,255,255,.08); }
    </style>
  </head>
  <body>
    <main>
      <h1>Staging ready</h1>
      <p>This is the MaximisedAI staging surface for one-shot apps, demos, and previews.</p>
      <div class="grid">
        <div class="card"><strong>Canonical domain</strong><br />staging.maximisedai.com</div>
        <div class="card"><strong>Apps</strong><br />Deploy apps under <code>/staging/&lt;slug&gt;/</code> in the repository and serve them at <code>/&lt;slug&gt;/</code> if copied to root slug folders.</div>
        <div class="card"><strong>PetFilth</strong><br /><a href="/petfilth/">Open /petfilth/</a></div>
      </div>
    </main>
  </body>
</html>
